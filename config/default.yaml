# Algorithmic Trading App - Default Configuration
# Override via environment or config file per environment.

# ---------------------------------------------------------------------------
# 1) Universe & Data (3 groups: regime = detect only; bot trades sector + targets)
# ---------------------------------------------------------------------------
# Market Regime (detect only; not traded): SPY, QQQ, TLT, HYG, VIXY → see market_regime.symbols
# Sector Rotation (traded): XLF, XLK, XLE
# Trade Targets (traded): AAPL, MSFT, NVDA, AMZN, META, GOOGL, AMD, TSLA, BABA, JD, PDD
universe:
  symbols:   # = Sector Rotation + Trade Targets (regime symbols used only for score)
    # Sector Rotation
    - XLF
    - XLK
    - XLE
    # Trade Targets
    - AAPL
    - MSFT
    - NVDA
    - AMZN
    - META
    - GOOGL
    - AMD
    - TSLA
    - BABA
    - JD
    - PDD
  # Minimum liquidity / volume filters
  min_avg_dollar_volume_30d: 50_000_000
  min_atr_multiple_for_volume: 0.5   # min volume vs ATR-based expectation

market_sessions:
  pre_market:
    start: "04:00"   # ET
    end: "09:30"
    trade_allowed: false   # thin liquidity
  regular:
    start: "09:30"
    end: "16:00"
    trade_allowed: true
  after_hours:
    start: "16:00"
    end: "20:00"
    trade_allowed: false   # wider spreads

market_quality:
  # Core liquid: tighter spread. High-vol names use high_vol_max_spread_pct. (0.10% blocks almost everything on IEX.)
  max_spread_pct: 0.5     # core liquid: allow up to 0.5%
  min_volume_atr_ratio: 1.0
  block_on_news_spike: true
  news_volatility_spike_atr_pct: 8.0   # block only when ATR% >= this (volatility spike)
  # High-vol bucket: wider spread allowed (IEX/thin names: COIN, RIVN, MARA, etc.)
  high_vol_symbols:
    - COIN
    - RIVN
    - SOFI
    - UPST
    - MARA
    - SMCI
    - SNOW
    - FXI
    - KWEB
    - BABA
    - JD
    - PDD
  high_vol_max_spread_pct: 1.5   # temporarily loosened for proof-of-life (core stays 0.5%)

# US market holidays / half-days (sample; extend per year)
holidays: []   # populated at runtime or from calendar

# ---------------------------------------------------------------------------
# 1b) Trade filters: macro blackout, earnings blackout, volatility DNT
# ---------------------------------------------------------------------------
trade_filters:
  # Macro-event blackout: no trading on these dates or time windows (ET)
  macro_blackout:
    enabled: true
    # Full-day blackout (no trading all day)
    blackout_dates: []   # e.g. ["2025-03-12", "2025-04-10"]  FOMC, CPI, etc.
    # Or specific time windows on a date (start/end in ET, "HH:MM")
    blackout_windows: []  # e.g. [{ date: "2025-03-12", start: "13:00", end: "15:30" }]

  # Earnings blackout per symbol: no trading N days before/after earnings
  earnings_blackout:
    enabled: true
    days_before: 1
    days_after: 1
    # Earnings dates per symbol (YYYY-MM-DD). Update manually or from calendar.
    earnings_dates:
      AAPL: []
      MSFT: []
      NVDA: []
      AMZN: []
      GOOGL: []
      META: []
      TSLA: []
      AVGO: []
      AMD: []
      NFLX: []
      JPM: []
      BRK.B: []
      BAC: []
      SMCI: []
      COIN: []
      PLTR: []
      SNOW: []
      XLF: []
      XLE: []
      XLV: []
      XLI: []
      XLY: []
      TLT: []
      GLD: []
      VIXY: []
      RIVN: []
      SOFI: []
      UPST: []
      MARA: []
      HYG: []
      XLK: []
      GS: []
      MS: []
      FXI: []
      KWEB: []
      BABA: []
      JD: []
      PDD: []

  # Volatility/spread-based "do not trade" (uses real ATR%, tiered spread)
  volatility_do_not_trade:
    enabled: true
    max_atr_pct: 6.0        # temporarily loosened for proof-of-life
    max_spread_pct: 0.5    # core liquid: max spread %
    high_vol_symbols:      # same as market_quality; wider spread for these
      - COIN
      - RIVN
      - SOFI
      - UPST
      - MARA
      - SMCI
      - SNOW
      - FXI
      - KWEB
      - BABA
      - JD
      - PDD
    high_vol_max_spread_pct: 1.0

# ---------------------------------------------------------------------------
# 2) Strategy (Trend-following as default)
# ---------------------------------------------------------------------------
strategy:
  type: trend_following   # trend_following | mean_reversion | breakout
  # Adopt style: retail = more signals (50/10 MA). neutral = strict (200/20 MA). institutional = volume filter.
  player_focus: retail   # retail = shorter horizon, more entries; neutral = fewer, longer-term
  # Institutional: only trade when volume >= N x 20d avg (proxy for institutional activity)
  institutional:
    min_volume_ratio_vs_avg: 1.2   # e.g. 1.2 = 20% above average volume
  # Retail: shorter lookbacks and time exit (momentum / shorter horizon)
  retail:
    ma_fast: 10
    ma_slow: 50
    time_bars_exit: 10
  # Candlestick filter: only enter when one of these patterns appears (uses same OHLC)
  candlestick_filter:
    enabled: false
    patterns: [ "bullish_engulfing", "hammer" ]   # or "doji"; leave empty to allow any
  trend_following:
    # Retail / more entries: 10/50 MAs, momentum, allow noisier names
    entry_mode: momentum
    ma_fast: 10
    ma_slow: 50
    pullback_touch_ma_fast: true
    pullback_tolerance_pct: 2.0   # used only when entry_mode: pullback
    volatility_filter_atr_period: 14
    max_atr_pct_for_entry: 3.0   # allow noisier names for proof-of-life
  exits:
    stop_loss_pct: 1.0
    partial_take_profit_pct: 2.0   # take partial at this % gain
    partial_exit_ratio: 0.5         # sell this fraction (e.g. 0.5 = 50%) at partial target
    trailing_stop_pct: 1.0          # trail remainder by this % below high
    time_bars_exit: 10
    kill_switch:
      max_spread_pct: 0.5
      max_atr_pct: 3.0   # exit if ATR% > this (was max_atr_multiple; same scale: percent)

# ---------------------------------------------------------------------------
# 3) Position Sizing
# ---------------------------------------------------------------------------
position_sizing:
  risk_per_trade_pct: 0.5      # 0.25 - 1.0
  max_open_risk_pct: 3.0       # sum of stop distances cap (2-5%)
  max_exposure_per_symbol_pct: 40.0   # max % of account in any single position
  max_exposure_per_sector_pct: 40.0
  # Position sizing reduction during high volatility regimes
  high_vol_reduction:
    enabled: true
    atr_pct_threshold: 2.0     # when ATR% (14d) > this, reduce size
    size_multiplier: 0.5       # multiply shares by this (e.g. half size)

# ---------------------------------------------------------------------------
# 4) Portfolio & Drawdown
# ---------------------------------------------------------------------------
portfolio_risk:
  daily_loss_limit_pct: -2.0
  max_drawdown_pct: -10.0
  safe_mode_after_max_dd: true
  recovery_criteria_pct: -8.0   # resume live after drawdown recovers to this
  max_trades_per_day: 15
  max_trades_per_symbol_per_day: 3

# ---------------------------------------------------------------------------
# 4b) Market regime score (adjust position size by regime)
# ---------------------------------------------------------------------------
# Score 0–5: SPY>MA50, QQQ>MA50, VIXY<threshold, HYG rising, TLT falling.
# 4–5 bullish, 2–3 neutral, 0–1 defensive. Bot detects regime first, then trades sector + targets.
market_regime:
  enabled: true
  symbols:   # Market Regime group (detect only; not in trade universe)
    spy: SPY
    qqq: QQQ
    vix: VIXY       # volatility proxy; raise vix_threshold if using VIXY (e.g. 25)
    hyg: HYG
    tlt: TLT
  ma_period_trend: 50           # for SPY/QQQ above MA
  ma_period_rising_falling: 20  # for HYG rising / TLT falling
  vix_threshold: 20
  size_multipliers:
    bullish: 1.0    # full size when score 4–5
    neutral: 0.8     # reduce when score 2–3
    defensive: 0.5   # half size when score 0–1

# ---------------------------------------------------------------------------
# 5) Execution
# ---------------------------------------------------------------------------
execution:
  prefer_limit_orders: true
  limit_order_offset_ticks: 1
  max_spread_pct_to_trade: 1.0   # must be >= widest tier; 0.10% blocks almost everything on IEX
  partial_fill_timeout_seconds: 30
  cancel_replace_on_partial: true
  max_slippage_bps: 10
  block_strategy_if_slippage_bps_avg_exceeds: 25

# ---------------------------------------------------------------------------
# 7) Broker (Alpaca)
# ---------------------------------------------------------------------------
broker:
  firm: alpaca
  # paper: true  = paper trading (no real money).  paper: false  = LIVE (real money).
  # Override without editing file: APCA_PAPER=false or ALPACA_LIVE=true for live; APCA_PAPER=true for paper.
  paper: true
  # Run continuously until market close (no user interaction):
  #   python run_alpaca_loop.py
  run_until_close: false
  exit_check_interval_minutes: 5   # check stop/target/trail/time every 5 min
  entry_check_interval_minutes: 10  # look for new buys every 10–15 min
  # Retry on API connection drops (e.g. "Remote end closed connection")
  # api_retry_times: 3
  # api_retry_delay_sec: 3.0
  # data_feed: iex   # free. Use "sip" only if you have a paid data subscription.
  # API keys from environment (never put real keys in this file):
  #   Paper: APCA_API_KEY_ID, APCA_API_SECRET_KEY  (from Alpaca Paper Trading → API Keys)
  #   Live:  ALPACA_LIVE_API_KEY_ID, ALPACA_LIVE_API_SECRET_KEY  (from Alpaca Live → API Keys; Alpaca uses separate keys for live)
  #   Or set APCA_* to live keys when running --live (then use paper keys only when running --paper).
  # Paper base URL: https://paper-api.alpaca.markets   Live: https://api.alpaca.markets

# ---------------------------------------------------------------------------
# 6) Compliance (PDT, etc.)
# ---------------------------------------------------------------------------
compliance:
  pdt_min_equity: 25000
  pdt_enabled: true
  margin_account: true
  day_trade_count_reset_calendar: "rolling_5_business_days"
  best_execution_note: "Broker has best execution duty; app enforces limits only."
